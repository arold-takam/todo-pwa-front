name: CI — Frontend

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.js'
      - '.github/workflows/ci-front.yml'
  pull_request:
    branches: [master]

jobs:

  lint-build-sonar:
    name: Lint, Build & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (avec URL back Render pour vérification)
        # On utilise le secret VITE_API_BASE_URL_PROD pour le build de vérification
        # Fallback sur /api/v1 si le secret n'est pas encore configuré
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD || '/api/v1' }}

      - name: SonarQube analysis
        # continue-on-error : Sonar échoue si les secrets ne sont pas configurés,
        # mais ça ne doit pas bloquer le reste de la pipeline
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONT }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-build-sonar
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # CORRECTION : ces secrets doivent aussi être dans le repo FRONT
          # Va dans Settings → Secrets → Actions du repo todo-pwa-front
          # et ajoute DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # L'image Docker utilise nginx proxy → /api/v1 suffit
          # (pour docker-compose local uniquement)
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-pwa-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-pwa-front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-netlify:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: lint-build-sonar
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build pour Netlify (URL Render en dur)
        # CORRECTION : on passe l'URL complète du back Render
        # Ce build est celui qui sera déployé sur Netlify
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: dist
          production-branch: master
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy — ${{ github.sha }}"
        env:
          # CORRECTION : ces 2 secrets doivent être dans le repo front
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}


